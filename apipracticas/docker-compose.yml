services:
  # Base de datos PostgreSQL
  postgresql:
    image: postgres:15
    container_name: app-db-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: nuestrosPaises
      POSTGRES_USER: UsuarioAdmin
      POSTGRES_PASSWORD: admin123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U UsuarioAdmin -d nuestrosPaises"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend Spring Boot
  backend:
    build: .
    container_name: app-spring
    restart: unless-stopped
    depends_on:
      postgresql:
        condition: service_healthy
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      SERVER_PORT: 8080
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgresql:5432/nuestrosPaises
      SPRING_DATASOURCE_USERNAME: UsuarioAdmin
      SPRING_DATASOURCE_PASSWORD: admin123
      API_KEY: ${API_KEY}

  # Frontend Angular con Nginx
  frontend:
    build: ../paisesFront
    container_name: app-angular
    restart: unless-stopped
    ports:
      - "4200:80"
    depends_on:
      - backend

volumes:
  postgres_data: