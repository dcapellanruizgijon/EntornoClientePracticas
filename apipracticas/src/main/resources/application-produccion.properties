spring.application.name=apipracticas

# Configuración  para MySQL
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/dcapellan_general}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}

# Configuración adicional para MySQL
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Update es para que CREE LA TABLA SI NO ESTÁ CREADA
spring.jpa.hibernate.ddl-auto=update